<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kai Lavatai — The Word in writing. Ministry reflections, music notes, and gospel truth from Claim The Word." />
  <title>The Word — Kai Lavatai / Claim The Word</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Dancing+Script:wght@500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/blog.css" />
</head>
<body>
<div id="master-wrapper">

  <!-- ============================================================
       NAV — secondary pattern (links back to index.html anchors)
       ============================================================ -->
  <nav id="navSecondary" aria-label="Main navigation">
    <button id="nav-menu-scroll-left-button" aria-label="Scroll navigation left" tabindex="0">
      <svg viewBox="0 0 10 16" width="10" height="16" aria-hidden="true">
        <path d="M8 2 L2 8 L8 14" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="nav-menu-scroll-container">
      <ul id="nav-menu-ul" role="list">
        <li id="nav-menu-ul-media_li"><a href="index.html#header">Media</a></li>
        <li id="nav-menu-ul-resources_li"><a href="index.html#resources-section">Resources</a></li>
        <li id="nav-menu-ul-contact_li"><a href="index.html#contact-section">Contact</a></li>
        <li id="nav-menu-ul-mission_li"><a href="index.html#missions-section">Mission</a></li>
        <li id="nav-menu-ul-people_li"><a href="index.html#people-section">People</a></li>
        <li id="nav-menu-ul-support_li"><a href="index.html#contact-section">Support</a></li>
        <li id="nav-menu-ul-souvenirs_li"><a href="souvenirs.html">Souvenirs</a></li>
        <li id="nav-menu-ul-blog_li" class="nav-active"><a href="blog.html">The Word</a></li>
      </ul>
    </div>
    <button id="nav-menu-scroll-right-button" aria-label="Scroll navigation right" tabindex="0">
      <svg viewBox="0 0 10 16" width="10" height="16" aria-hidden="true">
        <path d="M2 2 L8 8 L2 14" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <!-- ============================================================
       MAIN — meshgradient13 background, blobs, blog feed
       ============================================================ -->
  <main id="main">

    <!-- Parallax blob layers — same pattern as index/souvenirs -->
    <div class="blob-layer blob-main-1" aria-hidden="true"></div>
    <div class="blob-layer blob-main-2" aria-hidden="true"></div>
    <div class="blob-layer blob-main-3" aria-hidden="true"></div>
    <div class="blob-layer blob-main-4" aria-hidden="true"></div>

    <!-- ============================================================
         BLOG SECTION
         Full-bleed section. .synth-blog-feed namespace isolates
         all Blogger-injected HTML from global styles.
         ============================================================ -->
    <section id="blog-section" aria-labelledby="blog-section-heading">

      <!-- Page header — matches article heading typographic language -->
      <header id="blog-section-header">
        <h2 id="blog-section-subheading">Claim The Word</h2>
        <h1 id="blog-section-heading">The Word</h1>
        <p id="blog-section-tagline">Ministry reflections, music notes &amp; gospel truth.</p>
      </header>

      <!-- ── Feed output — .synth-blog-feed namespace ── -->
      <!-- JS builds <article> cards here.
           .synth-blog-feed scopes all Blogger-sourced HTML so inline
           styles from the Blogger editor cannot override global layout. -->
      <div id="blog-feed-output" class="synth-blog-feed" aria-label="Blog posts" hidden></div>

    </section><!-- /#blog-section -->

  </main><!-- /#main -->

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer id="footer">
    <h6 id="footer-copyright-statement-text">
      &copy; 2026 Kai Lavatai. All rights reserved
    </h6>
  </footer>

</div><!-- /#master-wrapper -->

<!-- Audio element present for main.js nav scroll binding -->
<audio id="audio-player" preload="none"></audio>

<!-- main.js: nav press-hold-scroll + blob parallax -->
<script src="js/main.js"></script>
<!-- blog.js: Blogger feed fetch, cache, render -->
<script src="js/blog.js"></script>
</body>
</html>
